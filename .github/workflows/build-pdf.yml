name: Build PDF

on:
  push:
    tags:
      - 'v*'

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-lang-cjk \
            texlive-lang-chinese \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            fonts-noto-cjk
          fc-cache -fv

      - name: Build main report PDF
        run: |
          pandoc report/main.md \
            --pdf-engine=xelatex \
            -V CJKmainfont="Noto Sans CJK JP" \
            -V mainfont="Noto Sans CJK JP" \
            -V geometry="margin=2.5cm" \
            -V fontsize=11pt \
            -V documentclass=article \
            -V lang=ja \
            --toc \
            -o ai-and-agile-future-${{ github.ref_name }}.pdf

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ai-and-agile-future-${{ github.ref_name }}.pdf
          generate_release_notes: false
          body: |
            ## 2030年のAIとアジャイル ${{ github.ref_name }}

            - [レポート本文](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/report/main.md)
